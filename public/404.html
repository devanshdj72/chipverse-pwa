<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ChipVerse</title>
    <script>
      var path = window.location.pathname;
      var base = '/chipverse-pwa';
      var route = path.replace(base, '') || '/';
      // Save the intended route for the SPA to pick up
      sessionStorage.setItem('redirect', route + window.location.search);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
