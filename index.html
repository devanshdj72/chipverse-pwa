<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ChipVerse</title>
    <meta name="description" content="Your guide to electronics, VLSI & semiconductor technology. Learn RTL, FPGA, Physical Design and more." />

    <!-- PWA -->
    <link rel="manifest" href="/chipverse-pwa/manifest.json" />
    <meta name="theme-color" content="#FF3C00" />

    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChipVerse" />
    <link rel="apple-touch-icon" href="/chipverse-pwa/icons/icon-192.png" />

    <!-- MS Tiles -->
    <meta name="msapplication-TileImage" content="/chipverse-pwa/icons/icon-192.png" />
    <meta name="msapplication-TileColor" content="#FF3C00" />

    <!-- Open Graph -->
    <meta property="og:title" content="ChipVerse" />
    <meta property="og:description" content="Your guide to electronics, VLSI & semiconductor technology." />
    <meta property="og:image" content="/chipverse-pwa/opengraph.jpg" />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/chipverse-pwa/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      // Handle SPA redirects from 404.html
      (function() {
        var redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          if (redirect !== '/') {
            window.history.replaceState(null, null, '/chipverse-pwa' + redirect);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
